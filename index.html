<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Sabores S&C</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>

:root{
--primary:#a05b3b;
--text:#3d2c1b;
--bg:#fdfaf7;
--pill:#ead7cd;
}

body{
background:var(--bg);
font-family:'Segoe UI',sans-serif;
color:var(--text);
}

.header{
padding:3rem 1rem;
text-align:center;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,.06);
}

.header img{
max-height:150px;
border-radius:50%;
padding:10px;
background:white;
box-shadow:0 6px 18px rgba(0,0,0,.15);
}

.brand{
font-weight:900;
font-size:2.4rem;
color:#a05b3b;
}

.slogan{
font-style:italic;
color:#7b4b34;
}

.search-wrap{
max-width:700px;
margin:auto;
margin-top:15px;
}

.product-card{
border:none;
border-radius:18px;
background:white;
box-shadow:0 6px 22px rgba(0,0,0,.08);
transition:.25s;
height:100%;
}

.product-card:hover{
transform:translateY(-6px);
}

.img-wrap{
height:220px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.img-wrap img{
max-height:200px;
object-fit:contain;
}

.price-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(90px,1fr));
gap:6px;
}

.price-pill{
outline:1px solid var(--pill);
border-radius:10px;
padding:6px;
text-align:center;
background:#fff7f1;
}

.uom{
font-weight:700;
}

.btn-whatsapp{
background:#25D366;
color:white;
border:none;
font-weight:bold;
}

.footer{
background:var(--primary);
color:white;
text-align:center;
padding:1rem;
margin-top:2rem;
}

.modal-img{
width:100%;
max-height:70vh;
object-fit:contain;
}

</style>
</head>

<body>

<header class="header">

<img src="img/logo.png">

<div class="brand">Sabores S&C</div>

<div class="slogan">El auténtico sabor de nuestra tierra</div>

<p class="fw-semibold">Distribuido y empacado por <strong>Sabores S&C</strong></p>

<div class="search-wrap">
<input id="searchInput" type="search" class="form-control form-control-lg" placeholder="Buscar producto...">
</div>

</header>


<main class="container py-5">

<div id="productGrid" class="row g-4"></div>

</main>


<footer class="footer">
© 2026 Sabores S&C • WhatsApp 5460 5731
</footer>


<!-- MODAL IMAGEN -->

<div class="modal fade" id="imgModal" tabindex="-1">
<div class="modal-dialog modal-dialog-centered modal-lg">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Vista del producto</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body text-center">
<img id="modalImage" class="modal-img">
</div>

</div>
</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const productos = [

["Flor de Jamaica","jamaica","227 g,454 g"],
["Bicarbonato","bicarbonato","50 g,227 g,454 g"],
["Miga de Pan","miga","227 g,454 g"],
["Tajín Artesanal","tajin","50 g,227 g,454 g"],
["Chía","chia","200 g,400 g"],
["Ajonjolí","ajonjoli","200 g"],
["Pepitoria","pepitoria","200 g,400 g"],
["Chile Pasa","chilepasa","30 g"],
["Chile Guaque","chileguaque","30 g"],
["Canela Dura","caneladura","30 g,227 g,454 g"],
["Canela Suave","canelasuave","30 g,454 g"],
["Cúrcuma","curcuma","50 g,227 g"],
["Bijol","bijol","50 g,227 g,454 g"],
["Poporopo","poporopo","400 g"],
["Pasas","pasas","200 g,400 g"],
["Ciruela Pasa","ciruela","200 g,400 g"],
["Coco Rayado","coco","200 g,400 g"],
["Paprika","paprika","50 g,200 g,454 g"],
["Consomé","consome","200 g,400 g"],
["Saborín","saborin","200 g,400 g"]

]

const grid=document.getElementById("productGrid")

productos.forEach(p=>{

let presentaciones=""

p[2].split(",").forEach(x=>{

let texto=x.trim()

if(texto==="227 g") texto="227 g (1/2 Lb)"
if(texto==="454 g") texto="454 g (1 Lb)"

presentaciones+=`<div class="price-pill"><div class="uom">${texto}</div></div>`

})

grid.innerHTML+=`

<div class="col-md-4 product" data-name="${p[1]}">

<div class="card product-card">

<div class="img-wrap">
<img src="img/${p[1]}.png" class="product-img">
</div>

<div class="card-body">

<h5>${p[0]}</h5>

<div class="price-list">
${presentaciones}
</div>

<a href="https://wa.me/50254605731?text=Hola%20quiero%20información%20del%20producto%20${p[0]}"
class="btn btn-whatsapp w-100 mt-2">
<i class="bi bi-whatsapp"></i> Pedir por WhatsApp
</a>

</div>
</div>
</div>

`

})



/* BUSCADOR */

const input=document.getElementById("searchInput")

input.addEventListener("input",function(){

let filter=input.value.toLowerCase()

document.querySelectorAll(".product").forEach(function(card){

let name=card.dataset.name.toLowerCase()

card.style.display=name.includes(filter)?"":"none"

})

})



/* EXPANDIR IMAGEN */

document.addEventListener("click",function(e){

if(e.target.classList.contains("product-img")){

let src=e.target.src

document.getElementById("modalImage").src=src

let modal=new bootstrap.Modal(document.getElementById("imgModal"))

modal.show()

}

})

</script>

</body>
</html>
